server:
  servlet:
    context-path: /api/v1
  http2:
    enabled: true
  port: 8080

spring:
  application:
    name: TicketRushServer
  data:
    redis:
      client-name: ticketrush-server
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PWD:}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketrush}
    username: ${DB_USR:ticketrush}
    password: ${DB_PWD:}
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        default_schema: v1
    open-in-view: true
  mail:
    test-connection: true
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USR:ticketrush}
    password: ${SMTP_PWD:ticketrush}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: false
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  output:
    ansi:
      enabled: always

app:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration: 86400
  mail:
    from: ${MAIL_FROM:}
